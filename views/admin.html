<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <title>Admin Selección</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
</head>
<body>
  <h1>{{NOMBRE_COMPLETO}}</h1>
  <p>C.C. {{IDENTIFICACION}}</p>
  <p>{{REQUISICION_INFO}}</p>

  <button id="btnEnviarSocio" type="button" data-idreq='{{IDREQ_JSON}}'>ENVIAR A SOCIODEMOGRÁFICA</button>

  <div id="modalContratacion" style="display:none; border:1px solid #ccc; padding:12px; margin-top:12px;">
    <form id="formFinal" action="/finalizar-contratacion" method="POST">
      <input type="hidden" name="id_aspirante" value="{{UUID}}">
      <input type="hidden" name="origen" value="admin">

      <label>Regional</label>
      <select id="selectRegional" name="regional" required></select>

      <label>Operación</label>
      <select id="selectOperacion" name="operacion" required></select>

      <label>Fecha ingreso</label>
      <input type="date" name="fecha_ingreso" required>

      <button id="btnCancelarModal" type="button">CANCELAR</button>
      <button id="btnConfirmarVinculacion" type="submit">CONFIRMAR</button>
    </form>
  </div>

<script>
  const uuid = "{{UUID}}";
  const regionalSugerida = "{{REGIONAL_SUGERIDA}}";
  const operacionSugerida = "{{OPERACION_SUGERIDA}}";

  const btnEnviar = document.getElementById('btnEnviarSocio');
  btnEnviar.addEventListener('click', () => {
    const idReq = JSON.parse(btnEnviar.dataset.idreq || 'null');
    if (!idReq) return alert('Falta requisición');
    if (!confirm('¿Enviar a Sociodemográfica?')) return;
    document.getElementById('modalContratacion').style.display = 'block';
  });

  document.getElementById('btnCancelarModal').addEventListener('click', () => {
    document.getElementById('modalContratacion').style.display = 'none';
  });

  async function cargarOperaciones(regional) {
    const selOp = document.getElementById('selectOperacion');
    selOp.innerHTML = '<option value="">Cargando...</option>';
    if (!regional) { selOp.innerHTML = '<option value="">Seleccione Operación</option>'; return; }

    const data = await fetch('/api/operaciones/' + encodeURIComponent(regional)).then(r => r.json()).catch(() => []);
    selOp.innerHTML = '<option value="">Seleccione Operación</option>';
    data.forEach(op => selOp.add(new Option(op, op)));
    if (operacionSugerida) selOp.value = operacionSugerida;
  }

  fetch('/api/regionales')
    .then(r => r.json())
    .then(async (data) => {
      const sel = document.getElementById('selectRegional');
      sel.innerHTML = '<option value="">Seleccione Regional</option>';
      data.forEach(reg => sel.add(new Option(reg, reg)));
      if (regionalSugerida) { sel.value = regionalSugerida; await cargarOperaciones(regionalSugerida); }
    });

  document.getElementById('selectRegional').addEventListener('change', async (e) => {
    await cargarOperaciones(e.target.value);
  });

  document.getElementById('formFinal').addEventListener('submit', async (e) => {
    e.preventDefault();

    const btn = document.getElementById('btnConfirmarVinculacion');
    const original = btn.innerText;
    btn.disabled = true;
    btn.innerText = 'PROCESANDO...';

    try {
      const form = e.target;
      const payload = new URLSearchParams(new FormData(form));

      const resp = await fetch(form.action, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: payload.toString()
      });

      const data = await resp.json().catch(() => null);
      if (!resp.ok || !data || !data.ok) {
        alert((data && (data.message + (data.details ? '\\n' + data.details : ''))) || 'Error');
        return;
      }
      window.location.href = data.redirect || ('/admin/' + uuid);
    } finally {
      btn.disabled = false;
      btn.innerText = original;
    }
  });
</script>
</body>
</html>
