<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <title>Portal Aspirante</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
</head>
<body>
  <h2>Hola, {{NOMBRE}}</h2>

  {{PDF_LINK}}

  <form id="mainForm" action="/upload-multiple" method="POST" enctype="multipart/form-data">
    <input type="hidden" name="id_aspirante" value="{{UUID}}">
    <input type="hidden" name="origen" value="portal">

    {{DOCS_HTML}}

    <button id="btnSubmit" type="submit">Cargar</button>
  </form>

<script>
  document.getElementById('mainForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const form = e.target;
    const btn = document.getElementById('btnSubmit');

    const inputs = form.querySelectorAll('input[type="file"]');
    const alguno = Array.from(inputs).some(i => i.files && i.files.length > 0);
    if (!alguno) { alert('Selecciona al menos un archivo'); return; }

    const original = btn.innerText;
    btn.innerText = 'Enviando...';
    btn.disabled = true;

    try {
      const resp = await fetch(form.action, { method:'POST', body: new FormData(form) });
      const json = await resp.json().catch(() => null);
      if (!resp.ok || !json || !json.ok) {
        alert((json && (json.message + (json.details ? '\\n' + json.details : ''))) || 'Error');
        return;
      }
      window.location.href = json.redirect || ('/portal/{{UUID}}');
    } finally {
      btn.innerText = original;
      btn.disabled = false;
    }
  });

  document.querySelectorAll('[data-delete-doc]').forEach((b) => {
    b.addEventListener('click', async () => {
      const id = Number(b.dataset.deleteDoc);
      if (!confirm('¿Eliminar este documento?')) return;

      const resp = await fetch('/delete-doc', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id_aspirante: '{{UUID}}', id_config_doc: id })
      });
      const data = await resp.json().catch(() => null);
      if (!resp.ok || !data || !data.ok) { alert('Error'); return; }
      window.location.href = data.redirect || ('/portal/{{UUID}}');
    });
  });
</script>
</body>
</html>
