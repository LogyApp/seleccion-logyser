<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Portal Aspirante | Logyser</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-6">
  <div class="max-w-3xl mx-auto">
    <div class="bg-white border rounded-2xl p-6 shadow">
      <h2 class="text-2xl font-bold">Hola, {{NOMBRE}}</h2>
      <div class="mt-2">{{PDF_LINK}}</div>

      <form id="mainForm" class="mt-6" action="/upload-multiple" method="POST" enctype="multipart/form-data">
        <input type="hidden" name="id_aspirante" value="{{UUID}}">
        <input type="hidden" name="origen" value="portal">

        <div class="space-y-3">
          {{DOCS_HTML}}
        </div>

        <button id="btnSubmit" type="submit" class="mt-6 w-full bg-slate-800 text-white py-3 rounded-xl font-bold">
          Cargar Documentos
        </button>
      </form>
    </div>
  </div>

<script>
  document.getElementById('mainForm')?.addEventListener('submit', async (e) => {
    e.preventDefault();

    const form = e.target;
    const btn = document.getElementById('btnSubmit');

    const inputs = form.querySelectorAll('input[type="file"]');
    const alguno = Array.from(inputs).some(i => i.files && i.files.length > 0);
    if (!alguno) { alert('Selecciona al menos un archivo'); return; }

    const originalText = btn ? btn.innerText : '';
    if (btn) { btn.disabled = true; btn.innerText = 'Subiendo...'; }

    try {
      const resp = await fetch(form.action, { method: 'POST', body: new FormData(form) });
      const json = await resp.json().catch(() => null);

      if (!resp.ok || !json || !json.ok) {
        alert((json && (json.message + (json.details ? '\\n' + json.details : ''))) || 'Error subiendo documentos');
        return;
      }

      window.location.href = json.redirect || ('/portal/{{UUID}}');
    } catch (err) {
      alert('Error de red: ' + (err?.message || err));
    } finally {
      if (btn) { btn.disabled = false; btn.innerText = originalText || 'Cargar Documentos'; }
    }
  });

  document.querySelectorAll('[data-delete-doc]').forEach((btn) => {
    btn.addEventListener('click', async () => {
      const id = Number(btn.dataset.deleteDoc);
      if (!id) return;

      if (!confirm('¿Eliminar este documento?')) return;

      const resp = await fetch('/delete-doc', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id_aspirante: '{{UUID}}', id_config_doc: id })
      });

      const data = await resp.json().catch(() => null);
      if (!resp.ok || !data || !data.ok) {
        alert((data && (data.message + (data.details ? '\\n' + data.details : ''))) || 'Error');
        return;
      }

      window.location.href = data.redirect || ('/portal/{{UUID}}');
    });
  });
</script>
</body>
</html>
